<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おひとりオフィス - レポート</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { padding: 2rem; }
        .hidden { display: none; }

        /* Layout */
        .report-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; }
        @media (max-width: 900px) { .report-layout { grid-template-columns: 1fr; } }

        /* Month nav */
        .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .month-nav h2 { margin: 0; }
        .month-nav button { width: auto; margin: 0; padding: 0.4rem 1rem; }

        /* Calendar */
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; text-align: center; font-size: 0.8rem; font-weight: bold; color: var(--muted-color); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .cal-day { min-height: 72px; padding: 4px; border: 1px solid var(--muted-border-color); border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .cal-day:hover { background: var(--secondary-background); }
        .cal-day.other-month { opacity: 0.35; cursor: default; }
        .cal-day.today .day-num { background: var(--primary); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
        .cal-day.selected { border-color: var(--primary); border-width: 2px; }
        .cal-day.sunday .day-num { color: #e53935; }
        .cal-day.saturday .day-num { color: #1e88e5; }
        .day-num { font-size: 0.8rem; font-weight: bold; margin-bottom: 3px; }
        .day-badges { display: flex; flex-wrap: wrap; gap: 2px; }
        .badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }
        .c0 { background: #e3f2fd; color: #1565c0; }
        .c1 { background: #e8f5e9; color: #2e7d32; }
        .c2 { background: #fff3e0; color: #e65100; }
        .c3 { background: #f3e5f5; color: #6a1b9a; }
        .c4 { background: #fce4ec; color: #880e4f; }
        .c5 { background: #e0f2f1; color: #004d40; }
        .c6 { background: #fff8e1; color: #f57f17; }

        /* Day detail */
        #day-panel { position: sticky; top: 1rem; }
        #day-panel h3 { margin-bottom: 0.75rem; }
        .entry-row { display: grid; grid-template-columns: 48px 52px 1fr auto; align-items: start; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--muted-border-color); font-size: 0.9rem; }
        .entry-time { color: var(--muted-color); font-size: 0.8rem; padding-top: 2px; }
        .entry-msg { color: var(--muted-color); font-size: 0.8rem; padding-top: 2px; word-break: break-word; }
        .entry-actions { display: flex; gap: 4px; }
        .btn-icon { background: none; border: none; cursor: pointer; padding: 2px 5px; font-size: 0.8rem; color: var(--muted-color); border-radius: 3px; }
        .btn-icon:hover { background: var(--secondary-background); color: var(--color); }
        .btn-icon.delete:hover { color: #e53935; }

        /* Edit form */
        .edit-form { background: var(--secondary-background); border-radius: 4px; padding: 0.75rem; margin-top: 0.5rem; grid-column: 1 / -1; }
        .edit-form label { font-size: 0.8rem; margin-bottom: 0.2rem; display: block; }
        .edit-form select, .edit-form input, .edit-form textarea { margin-bottom: 0.5rem; padding: 0.3rem 0.5rem; font-size: 0.85rem; }
        .edit-form textarea { min-height: 60px; }
        .edit-form-actions { display: flex; gap: 0.5rem; }
        .edit-form-actions button { width: auto; padding: 0.3rem 0.8rem; font-size: 0.8rem; margin: 0; }

        .user-group-header { font-size: 0.75rem; font-weight: bold; padding: 0.5rem 0 0.2rem; color: var(--muted-color); border-top: 2px solid var(--muted-border-color); margin-top: 0.5rem; }
        .user-group-header:first-child { border-top: none; margin-top: 0; }
        .no-entries { color: var(--muted-color); font-size: 0.9rem; text-align: center; padding: 2rem 0; }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>おひとりオフィス - レポート</h1>
            <div id="auth-section" style="display:flex; align-items:center; gap:1rem;">
                <a href="index.html">← 打刻ページへ</a>
                <button id="login-btn">Googleでログイン</button>
                <span id="user-email-disp" class="hidden" style="font-size:0.9rem;"></span>
                <button id="logout-btn" class="hidden secondary" style="width:auto;">ログアウト</button>
            </div>
        </header>

        <div id="app-section" class="hidden">
            <div class="month-nav">
                <button id="prev-month" class="secondary">&#8592;</button>
                <h2 id="month-label"></h2>
                <button id="next-month" class="secondary">&#8594;</button>
            </div>

            <div class="report-layout">
                <div>
                    <div class="calendar-header">
                        <div>日</div><div>月</div><div>火</div>
                        <div>水</div><div>木</div><div>金</div><div>土</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>

                <div id="day-panel">
                    <p id="day-panel-placeholder" style="color:var(--muted-color);">日付をクリックすると記録を表示します</p>
                    <div id="day-detail" class="hidden">
                        <h3 id="day-title"></h3>
                        <div id="entries-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mhfnlunlthcfyxofoczn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3jnvblL9f67SK7GdWAbl3w_6SXP2hWt';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { flowType: 'implicit' }
        });

        // DOM
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const appSection = document.getElementById('app-section');
        const userEmailDisp = document.getElementById('user-email-disp');
        const monthLabel = document.getElementById('month-label');
        const calendarGrid = document.getElementById('calendar-grid');
        const dayPanel = document.getElementById('day-panel');
        const dayDetail = document.getElementById('day-detail');
        const dayTitle = document.getElementById('day-title');
        const entriesList = document.getElementById('entries-list');
        const dayPanelPlaceholder = document.getElementById('day-panel-placeholder');

        // State
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();
        let monthEntries = [];
        let selectedDateStr = null;
        let currentUser = null;
        let userColorMap = {};
        let userColorCounter = 0;
        let editingId = null;

        // --- Utilities ---
        const getUserColor = (email) => {
            if (!(email in userColorMap)) {
                userColorMap[email] = userColorCounter++ % 7;
            }
            return userColorMap[email];
        };

        const toJSTDateStr = (isoStr) => {
            const d = new Date(isoStr);
            const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
            return jst.toISOString().slice(0, 10);
        };

        const toJSTTimeStr = (isoStr) => {
            return new Date(isoStr).toLocaleTimeString('ja-JP', {
                timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit'
            });
        };

        const toJSTDatetimeLocal = (isoStr) => {
            const d = new Date(isoStr);
            const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
            return jst.toISOString().slice(0, 16);
        };

        const fromJSTDatetimeLocal = (jstStr) => {
            return new Date(jstStr + '+09:00').toISOString();
        };

        const MODES = ['出勤', '退勤', '休憩', '復帰', '報告'];

        // --- Data ---
        const fetchMonthEntries = async () => {
            const year = currentYear;
            const month = currentMonth;
            const startDate = `${year}-${String(month + 1).padStart(2, '0')}-01`;
            const lastDay = new Date(year, month + 1, 0).getDate();
            const endDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

            const { data, error } = await sb.rpc('get_activities_by_date', { start_date: startDate, end_date: endDate });
            if (error) { console.error(error); return; }

            monthEntries = data;
            renderCalendar();
            if (selectedDateStr) renderDayDetail(selectedDateStr);
        };

        // --- Calendar ---
        const renderCalendar = () => {
            monthLabel.textContent = `${currentYear}年${currentMonth + 1}月`;
            calendarGrid.innerHTML = '';

            const firstDow = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

            // Group entries by JST date
            const byDate = {};
            monthEntries.forEach(e => {
                const d = toJSTDateStr(e.created_at);
                if (!byDate[d]) byDate[d] = new Set();
                byDate[d].add(e.email);
            });

            const totalCells = 42;
            let nextDay = 1;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-day';

                if (i < firstDow) {
                    // Prev month
                    const d = daysInPrevMonth - firstDow + i + 1;
                    cell.classList.add('other-month');
                    cell.innerHTML = `<div class="day-num">${d}</div>`;
                } else if (nextDay > daysInMonth) {
                    // Next month
                    const d = nextDay - daysInMonth;
                    cell.classList.add('other-month');
                    cell.innerHTML = `<div class="day-num">${d}</div>`;
                    nextDay++;
                } else {
                    const dow = i % 7;
                    if (dow === 0) cell.classList.add('sunday');
                    if (dow === 6) cell.classList.add('saturday');

                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(nextDay).padStart(2, '0')}`;
                    const isToday = currentYear === today.getFullYear() && currentMonth === today.getMonth() && nextDay === today.getDate();
                    if (isToday) cell.classList.add('today');
                    if (dateStr === selectedDateStr) cell.classList.add('selected');

                    let badgesHtml = '<div class="day-badges">';
                    if (byDate[dateStr]) {
                        byDate[dateStr].forEach(email => {
                            const c = getUserColor(email);
                            badgesHtml += `<span class="badge c${c}">${email.split('@')[0]}</span>`;
                        });
                    }
                    badgesHtml += '</div>';

                    cell.innerHTML = `<div class="day-num">${nextDay}</div>${badgesHtml}`;
                    cell.dataset.date = dateStr;
                    cell.addEventListener('click', () => selectDay(dateStr, cell));
                    nextDay++;
                }

                calendarGrid.appendChild(cell);
            }
        };

        const selectDay = (dateStr, cell) => {
            document.querySelectorAll('.cal-day').forEach(c => c.classList.remove('selected'));
            cell.classList.add('selected');
            selectedDateStr = dateStr;
            renderDayDetail(dateStr);
        };

        // --- Day Detail ---
        const renderDayDetail = (dateStr) => {
            const [y, m, d] = dateStr.split('-').map(Number);
            const dow = ['日', '月', '火', '水', '木', '金', '土'][new Date(y, m - 1, d).getDay()];
            dayTitle.textContent = `${y}年${m}月${d}日（${dow}）`;

            const dayData = monthEntries.filter(e => toJSTDateStr(e.created_at) === dateStr);

            dayPanelPlaceholder.classList.add('hidden');
            dayDetail.classList.remove('hidden');

            if (dayData.length === 0) {
                entriesList.innerHTML = '<p class="no-entries">記録はありません</p>';
                return;
            }

            // Group by user
            const byUser = {};
            dayData.forEach(e => {
                if (!byUser[e.email]) byUser[e.email] = [];
                byUser[e.email].push(e);
            });

            let html = '';
            Object.entries(byUser).forEach(([email, entries]) => {
                const c = getUserColor(email);
                html += `<div class="user-group-header"><span class="badge c${c}">${email.split('@')[0]}</span></div>`;
                entries.forEach(entry => {
                    const isOwn = currentUser && entry.user_id === currentUser.id;
                    html += `
                        <div class="entry-row" id="row-${entry.id}">
                            <span class="entry-time">${toJSTTimeStr(entry.created_at)}</span>
                            <span>${entry.mode}</span>
                            <span class="entry-msg">${entry.message ? escapeHtml(entry.message) : ''}</span>
                            <span class="entry-actions">
                                ${isOwn ? `
                                    <button class="btn-icon" onclick="startEdit('${entry.id}')" title="編集">✏️</button>
                                    <button class="btn-icon delete" onclick="confirmDelete('${entry.id}')" title="削除">🗑️</button>
                                ` : ''}
                            </span>
                        </div>
                    `;
                });
            });

            entriesList.innerHTML = html;
        };

        // --- Edit ---
        const startEdit = (id) => {
            if (editingId) cancelEdit();
            editingId = id;

            const entry = monthEntries.find(e => e.id === id);
            if (!entry) return;

            const row = document.getElementById(`row-${id}`);
            const form = document.createElement('div');
            form.className = 'edit-form';
            form.id = `edit-${id}`;
            form.innerHTML = `
                <label>日時（JST）</label>
                <input type="datetime-local" id="edit-time-${id}" value="${toJSTDatetimeLocal(entry.created_at)}">
                <label>モード</label>
                <select id="edit-mode-${id}">
                    ${MODES.map(m => `<option${m === entry.mode ? ' selected' : ''}>${m}</option>`).join('')}
                </select>
                <label>メモ</label>
                <textarea id="edit-msg-${id}">${entry.message || ''}</textarea>
                <div class="edit-form-actions">
                    <button onclick="saveEdit('${id}')">保存</button>
                    <button class="secondary" onclick="cancelEdit()">キャンセル</button>
                </div>
            `;
            row.after(form);

            // Highlight row
            row.style.opacity = '0.5';
        };

        const cancelEdit = () => {
            if (!editingId) return;
            const form = document.getElementById(`edit-${editingId}`);
            const row = document.getElementById(`row-${editingId}`);
            if (form) form.remove();
            if (row) row.style.opacity = '';
            editingId = null;
        };

        const saveEdit = async (id) => {
            const timeVal = document.getElementById(`edit-time-${id}`).value;
            const modeVal = document.getElementById(`edit-mode-${id}`).value;
            const msgVal = document.getElementById(`edit-msg-${id}`).value.trim();

            const { error } = await sb.from('time_entries').update({
                created_at: fromJSTDatetimeLocal(timeVal),
                mode: modeVal,
                message: msgVal || null,
            }).eq('id', id);

            if (error) {
                alert('更新に失敗しました: ' + error.message);
                return;
            }

            cancelEdit();
            await fetchMonthEntries();
        };

        // --- Delete ---
        const confirmDelete = async (id) => {
            if (!confirm('この記録を削除しますか？')) return;

            const { data: { session } } = await sb.auth.getSession();
            console.log('delete: session user =', session?.user?.id, 'target id =', id);

            const { data, error } = await sb.from('time_entries')
                .delete()
                .eq('id', id)
                .select('id');

            console.log('delete result: data =', data, 'error =', error);

            if (error) {
                alert('削除に失敗しました: ' + error.message);
                return;
            }
            if (!data || data.length === 0) {
                alert('削除できませんでした（RLSにより拒否された可能性があります）');
                return;
            }
            await fetchMonthEntries();
        };

        // --- Security ---
        const escapeHtml = (str) => str
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        // --- Auth ---
        const updateUI = async (user) => {
            if (user) {
                if (!user.email.endsWith('@otsuma.ac.jp')) {
                    await sb.auth.signOut();
                    alert('このサービスは otsuma.ac.jp のアカウントのみ使用できます。');
                    return;
                }
                currentUser = user;
                appSection.classList.remove('hidden');
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userEmailDisp.classList.remove('hidden');
                userEmailDisp.textContent = user.email;
                await fetchMonthEntries();
            } else {
                currentUser = null;
                appSection.classList.add('hidden');
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userEmailDisp.classList.add('hidden');
            }
        };

        loginBtn.addEventListener('click', () => sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
        }));
        logoutBtn.addEventListener('click', () => sb.auth.signOut());

        document.getElementById('prev-month').addEventListener('click', () => {
            if (currentMonth === 0) { currentYear--; currentMonth = 11; }
            else currentMonth--;
            selectedDateStr = null;
            dayDetail.classList.add('hidden');
            dayPanelPlaceholder.classList.remove('hidden');
            fetchMonthEntries();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            if (currentMonth === 11) { currentYear++; currentMonth = 0; }
            else currentMonth++;
            selectedDateStr = null;
            dayDetail.classList.add('hidden');
            dayPanelPlaceholder.classList.remove('hidden');
            fetchMonthEntries();
        });

        // --- Init ---
        const initialize = async () => {
            sb.auth.onAuthStateChange((_event, session) => {
                updateUI(session?.user ?? null);
            });
            const { data: { session } } = await sb.auth.getSession();
            updateUI(session?.user ?? null);
        };

        initialize();
    </script>
</body>
</html>
